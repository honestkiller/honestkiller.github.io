<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Magic Game</title>
    <link rel="icon" type="image/png" sizes="32x32" href="resources/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="resources/images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="resources/images/apple-touch-icon.png">
    <link rel="manifest" href="resources/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="resources/css/main.css">
    <style>
        .math-shell { max-width: 620px; margin: 0 auto; }
        .problem { font-size: 2.5rem; margin: 2rem 0; color: #0f766e; font-family: 'Baloo 2', cursive; }
        .answer-input { font-size: 1.4rem; padding: 0.6rem; width: 170px; border: 2px solid #8bcfc8; border-radius: 8px; text-align: center; margin: 1rem 0; }
        .submit-btn { background: #0f766e; color: white; border: none; padding: 0.9rem 1.5rem; font-size: 1rem; border-radius: 999px; cursor: pointer; font-weight: 700; }
        .submit-btn:hover { background: #115e59; }
        .score { font-size: 1.15rem; margin: 1rem 0; color: #115e59; }
        .result { margin: 1rem 0; padding: 1rem; border-radius: 10px; display: none; }
        .correct { background: #dcfce7; color: #166534; }
        .incorrect { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body style="--page-bg-image: url('https://images.unsplash.com/photo-1509228468518-180dd4864904?auto=format&fit=crop&w=1800&q=80');">
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="index.html">Teaching Portal</a>
            <nav class="site-nav">
                <a href="index.html">Home</a>
                <a href="course-materials.html">Course Materials</a>
                <a href="explore.html" class="active">Explore</a>
                <a href="course-schedule.html">Schedule &amp; Calendar</a>
                <a href="puzzles.html">Puzzles</a>
                <a href="about-me.html">About Me</a>
            </nav>
        </div>
    </header>

    <main class="activity-wrap">
        <section class="activity-shell math-shell" style="text-align:center;">
            <h1 class="activity-title">Math Magic Game 🎯</h1>
            <p class="score">Score: <span id="score">0</span></p>
            <div class="problem" id="problem"></div>
            <input type="number" class="answer-input" id="answer" placeholder="Your answer">
            <p><button class="submit-btn" onclick="checkAnswer()">Submit</button></p>
            <div class="result" id="result"></div>
        </section>
    </main>

    <script>
        let score = 0;
        let correctAnswer = 0;

        function generateProblem() {
            const num1 = Math.floor(Math.random() * 12) + 1;
            const num2 = Math.floor(Math.random() * 12) + 1;
            const operators = ['+', '-', '×'];
            const operator = operators[Math.floor(Math.random() * operators.length)];

            const problemElement = document.getElementById('problem');
            problemElement.textContent = `${num1} ${operator} ${num2} = ?`;

            switch(operator) {
                case '+': correctAnswer = num1 + num2; break;
                case '-': correctAnswer = num1 - num2; break;
                case '×': correctAnswer = num1 * num2; break;
            }

            document.getElementById('answer').value = '';
            document.getElementById('result').style.display = 'none';
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const resultElement = document.getElementById('result');
            resultElement.style.display = 'block';

            if (userAnswer === correctAnswer) {
                score += 10;
                resultElement.textContent = '🎉 Correct! +10 points';
                resultElement.className = 'result correct';
                setTimeout(generateProblem, 1500);
            } else {
                resultElement.textContent = '❌ Try again!';
                resultElement.className = 'result incorrect';
            }

            document.getElementById('score').textContent = score;
        }

        generateProblem();
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
