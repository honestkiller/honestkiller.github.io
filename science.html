<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Science Fun</title>
    <link rel="icon" type="image/png" sizes="32x32" href="resources/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="resources/images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="resources/images/apple-touch-icon.png">
    <link rel="manifest" href="resources/site.webmanifest">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Roboto', sans-serif; background: #0a0a0a; }
        
        body { display: flex; flex-direction: column; }
        
        .container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: #0a0a0a;
            overflow: hidden;
        }
        
        .nav { 
            padding: 1rem; 
            text-align: center; 
            background: rgba(0,0,0,0.5);
            z-index: 10;
            display: flex;
            gap: 2rem;
            justify-content: center;
        }
        .nav a { 
            color: #64b5f6; 
            text-decoration: none; 
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .nav a:hover { color: #2196f3; }
        
        h1 { display: none; }
        
        /* YouTube Videos Section */
        .videos-section { 
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .videos-section h2 { 
            color: #64b5f6; 
            margin: 0; 
            padding: 1rem;
            text-align: center;
            background: rgba(0,0,0,0.3);
            font-size: 1.5rem;
        }
        .videos-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            flex: 1;
            width: 100%;
        }
        .videos-container::-webkit-scrollbar {
            height: 10px;
        }
        .videos-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .videos-container::-webkit-scrollbar-thumb {
            background: #2196f3;
            border-radius: 10px;
        }
        .videos-container::-webkit-scrollbar-thumb:hover {
            background: #64b5f6;
        }
        .video-item {
            flex-shrink: 0;
            width: 80%;
            max-width: 500px;
            aspect-ratio: 9 / 16;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .video-item:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 30px rgba(33, 150, 243, 0.5);
        }
        .video-item iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="explore.html">Back to Explore</a>
        </div>
        <h1>🔬 Fun Science Experiments!</h1>
        
        <div class="videos-section">
            <h2>📹 Science Videos</h2>
            <div class="videos-container" id="videoContainer"></div>
        </div>
    </div>

    <script>
        const videoIds = [
            '3VN1KVOMJhY',
            '5ZmyN-kp2gE',
            'TDNay0tvnLY',
            '3e-vAehFODE',
            'J8bd1ymDUSQ',
            'p1POFj5J3UE'
        ];

        function getRandomVideo() {
            return videoIds[Math.floor(Math.random() * videoIds.length)];
        }

        function loadRandomVideo() {
            const randomVideoId = getRandomVideo();
            const container = document.getElementById('videoContainer');
            
            const videoItem = document.createElement('div');
            videoItem.className = 'video-item';
            videoItem.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${randomVideoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            `;
            
            container.appendChild(videoItem);
        }

        window.addEventListener('load', loadRandomVideo);
    </script>
</body>
</html>
