<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Fun</title>
    <link rel="icon" type="image/png" sizes="32x32" href="resources/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="resources/images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="resources/images/apple-touch-icon.png">
    <link rel="manifest" href="resources/site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="resources/css/main.css">
    <style>
        .science-shell { background: #0b1020; border-color: #1e293b; color: #dbeafe; }
        .science-shell h1, .science-shell h2 { color: #93c5fd; }
        .videos-section { display: flex; flex-direction: column; gap: 1rem; }
        .videos-container { display: flex; justify-content: center; align-items: center; }
        .video-item { width: min(100%, 420px); aspect-ratio: 9 / 16; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 22px rgba(59,130,246,0.35); }
        .video-item iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="index.html">Teaching Portal</a>
            <nav class="site-nav">
                <a href="index.html">Home</a>
                <a href="explore.html" class="active">Explore</a>
                <a href="puzzles.html">Puzzles</a>
                <a href="about-me.html">About Me</a>
            </nav>
        </div>
    </header>

    <main class="activity-wrap">
        <section class="activity-shell science-shell">
            <h1 class="activity-title">🔬 Fun Science Experiments</h1>
            <p class="subtle-note" style="color:#bfdbfe;">Watch short science clips and discover new ideas every visit.</p>
            <div class="videos-section">
                <h2>📹 Science Video Spotlight</h2>
                <div class="videos-container" id="videoContainer"></div>
            </div>
        </section>
    </main>

    <script>
        const videoIds = ['3VN1KVOMJhY', '5ZmyN-kp2gE', 'TDNay0tvnLY', '3e-vAehFODE', 'J8bd1ymDUSQ', 'p1POFj5J3UE'];
        function getRandomVideo() { return videoIds[Math.floor(Math.random() * videoIds.length)]; }
        function loadRandomVideo() {
            const randomVideoId = getRandomVideo();
            const container = document.getElementById('videoContainer');
            const videoItem = document.createElement('div');
            videoItem.className = 'video-item';
            videoItem.innerHTML = `<iframe src="https://www.youtube.com/embed/${randomVideoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            container.appendChild(videoItem);
        }
        window.addEventListener('load', loadRandomVideo);
    </script>
</body>
</html>
